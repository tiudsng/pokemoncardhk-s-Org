<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Invest - Apple Style Bento Grid</title>
    <!-- 引入 Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* 價格閃爍動畫 */
        @keyframes flashGreen {
            0% { background-color: transparent; color: white; }
            10% { background-color: #30d158; color: black; border-radius: 4px; padding: 0 4px; }
            100% { background-color: transparent; color: white; }
        }
        .price-flash {
            animation: flashGreen 0.5s ease-out;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h2 class="text-2xl sm:text-3xl font-bold flex items-center justify-center gap-2 mb-2">
                [ 🏆 價格排行榜 ]
            </h2>
            <p class="text-gray-400 text-sm font-medium">Live Update from Firestore</p>
        </div>

        <!-- Bento Grid 容器 -->
        <div id="bento-grid-container" class="space-y-4">
            <div class="text-center text-gray-500 py-10">
                <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#00ff00] mx-auto mb-4"></div>
                載入數據中...
            </div>
        </div>
    </div>

    <!-- Firebase JS SDK (Module 寫法) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. 替換為你的 Firebase Config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 紀錄上一次的價格，用來觸發閃爍動畫
        const previousPrices = {};

        // 2. 實時監聽 Firestore 數據
        function listenToTcgData() {
            const q = query(collection(db, "products"), orderBy("rank", "asc"), limit(10));
            const container = document.getElementById('bento-grid-container');

            onSnapshot(q, (snapshot) => {
                const products = [];
                snapshot.forEach((doc) => {
                    products.push({ id: doc.id, ...doc.data() });
                });

                renderBentoGrid(products, container);
            }, (error) => {
                console.error("讀取 Firestore 失敗:", error);
                container.innerHTML = `<div class="text-red-500 text-center py-10">讀取數據失敗，請檢查 Firebase 設定。</div>`;
            });
        }

        // 3. 渲染 Apple Style Bento Grid
        function renderBentoGrid(products, container) {
            if (products.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 py-10">暫無數據</div>`;
                return;
            }

            let html = '';
            const top1 = products[0];
            const top2and3 = products.slice(1, 3);
            const remaining = products.slice(3);

            // 判斷價格是否改變 (觸發閃爍)
            const getPriceClass = (id, currentPrice) => {
                let className = "";
                if (previousPrices[id] && previousPrices[id] !== currentPrice) {
                    className = "price-flash";
                }
                previousPrices[id] = currentPrice;
                return className;
            };

            const getChangeColor = (change) => {
                return change && change.startsWith('+') ? 'text-[#30d158]' : 'text-[#ff453a]';
            };

            // 渲染 NO.1 (大橫幅卡片)
            if (top1) {
                const priceClass = getPriceClass(top1.id, top1.market_data?.snkrdunk_price);
                html += `
                <div class="relative bg-[#222222] rounded-[1.5rem] p-4 flex gap-4 border border-white/5 shadow-lg">
                    <div class="absolute -top-6 -left-4 text-5xl z-10 drop-shadow-lg">👑</div>
                    
                    <div class="w-28 sm:w-36 shrink-0 rounded-xl overflow-hidden bg-gray-800 shadow-md">
                        <img src="${top1.image_url}" alt="${top1.name_zh}" class="w-full h-full object-cover" referrerpolicy="no-referrer" />
                    </div>

                    <div class="flex-1 flex flex-col justify-between py-1">
                        <div>
                            <div class="flex items-start justify-between mb-2">
                                <span class="text-3xl font-black tracking-tight text-white leading-none">NO.1</span>
                                <div class="bg-black text-white text-[8px] font-bold px-1.5 py-0.5 rounded-md leading-tight text-center tracking-tighter">SNKR<br/>DUNK</div>
                            </div>
                            <h3 class="text-sm sm:text-base font-medium text-white leading-snug mb-1">
                                ${top1.name_zh}<br/>
                                <span class="text-xs text-gray-400">[${top1.set_name}]</span>
                            </h3>
                        </div>
                        <div class="flex items-center gap-2 mt-3">
                            <span class="${getChangeColor(top1.market_data?.change_24h)} font-bold text-lg sm:text-xl">
                                ${top1.market_data?.change_24h || '-'}
                            </span>
                            <span class="text-white font-bold text-sm sm:text-base">
                                / <span class="${priceClass}">HK$ ${(top1.market_data?.snkrdunk_price || 0).toLocaleString()}</span>
                            </span>
                        </div>
                    </div>
                </div>
                `;
            }

            // 渲染 NO.2 & NO.3 (雙格並排)
            if (top2and3.length > 0) {
                html += `<div class="grid grid-cols-2 gap-3 sm:gap-4 mt-4">`;
                top2and3.forEach(card => {
                    const priceClass = getPriceClass(card.id, card.market_data?.snkrdunk_price);
                    html += `
                    <div class="bg-[#222222] rounded-[1.25rem] sm:rounded-[1.5rem] p-3 flex flex-col gap-3 border border-white/5 shadow-lg">
                        <div class="flex gap-3">
                            <div class="w-16 md:w-20 aspect-[3/4] shrink-0 rounded-lg overflow-hidden bg-gray-800 shadow-md">
                                <img src="${card.image_url}" alt="${card.name_zh}" class="w-full h-full object-cover" referrerpolicy="no-referrer" />
                            </div>
                            <div class="flex-1 flex flex-col min-w-0">
                                <div class="flex items-start justify-between mb-1">
                                    <span class="text-xl font-black tracking-tight text-white leading-none">NO.${card.rank}</span>
                                </div>
                                <h3 class="text-xs md:text-sm font-medium text-white leading-tight mt-1 truncate">${card.name_zh}</h3>
                            </div>
                        </div>
                        <div class="flex items-center gap-1.5 mt-auto pt-2 border-t border-white/5">
                            <span class="${getChangeColor(card.market_data?.change_24h)} font-bold text-sm md:text-base">
                                ${card.market_data?.change_24h || '-'}
                            </span>
                            <span class="text-white font-bold text-xs md:text-sm truncate">
                                / <span class="${priceClass}">HK$ ${(card.market_data?.snkrdunk_price || 0).toLocaleString()}</span>
                            </span>
                        </div>
                    </div>
                    `;
                });
                html += `</div>`;
            }

            // 渲染其餘排名 (列表)
            if (remaining.length > 0) {
                html += `<div class="mt-4 space-y-3">`;
                remaining.forEach(card => {
                    const priceClass = getPriceClass(card.id, card.market_data?.snkrdunk_price);
                    html += `
                    <div class="bg-[#1a1a1a] rounded-xl p-3 flex items-center gap-3 border border-white/5">
                        <div class="w-8 font-black text-gray-500 text-lg text-center">${card.rank}</div>
                        <div class="w-12 aspect-[3/4] shrink-0 rounded overflow-hidden bg-gray-800">
                            <img src="${card.image_url}" alt="${card.name_zh}" class="w-full h-full object-cover" referrerpolicy="no-referrer" />
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-medium text-white truncate">${card.name_zh}</h4>
                            <p class="text-xs text-gray-400 truncate">${card.set_name}</p>
                        </div>
                        <div class="text-right shrink-0">
                            <div class="text-white font-bold text-sm">
                                <span class="${priceClass}">HK$ ${(card.market_data?.snkrdunk_price || 0).toLocaleString()}</span>
                            </div>
                            <div class="${getChangeColor(card.market_data?.change_24h)} font-bold text-xs">
                                ${card.market_data?.change_24h || '-'}
                            </div>
                        </div>
                    </div>
                    `;
                });
                html += `</div>`;
            }

            container.innerHTML = html;
        }

        // 啟動
        listenToTcgData();
    </script>
</body>
</html>
